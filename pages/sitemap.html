<title>Sitemap</title>
<meta name="robots" content="index, follow">
<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}
h1 {
    margin-bottom: 10px;
}
ul {
    line-height: 1.8;
}
a {
    text-decoration: none;
}
</style>
<ul>
{% for post in site.posts %}
  <li>
    <a href="{{ post.url | relative_url }}">
      {{ post.title }}
    </a>
  </li>
{% endfor %}
</ul>
