---
layout: default
---
<!-- Post Featured Image -->
{% if page.image %}
<div class="text-center mx-auto mb-5">
  <a href="https://tiny.cc/smartlynk">
    <img class="featured-image text-center mx-auto rounded" src="{{ site.baseurl }}/{{ page.image }}"
      alt="{{ page.title }}">
  </a>
</div>
{% endif %}
<!-- End Featured Image -->

<div class="col-lg-8 mx-auto">

  <div class="mainheading">
    <h1 class="posttitle">{{ page.title }}</h1>
  </div>

  <div class="article-post serif-font">
    {{content}}
  </div>

  {% if page.comments == true %}
  <div id="comments">
    {% include disqus.html %}
  </div>
  {% endif %}

</div>
